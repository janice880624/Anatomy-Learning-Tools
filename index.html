        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .node-active { background-color: #1e40af !important; color: white !important; border-color: #1e40af !important; }

        .landmark-card:hover { border-color: #3b82f6; background-color: #eff6ff; }
        .hidden-view { display: none !important; }
        .hotspot { cursor: pointer; transition: all 0.3s; fill: #ef4444; fill-opacity: 0.6; stroke: #fff; stroke-width: 1.5; }

        .anatomy-svg { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        .tag-o { background: #dcfce7; color: #166534; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-right: 6px; }

        function switchView(v) {

            document.querySelectorAll('header button').forEach(b => b.className = 'px-4 py-2 rounded-xl text-sm transition-all text-slate-600 hover:bg-slate-50');
            document.getElementById(`btn-${v}`).className = `px-4 py-2 rounded-xl text-sm transition-all bg-blue-600 text-white font-bold`;
        }

                    <h2 class="text-2xl font-black text-${group.color}-700 mb-6 flex items-center"><span class="mr-3">${group.icon}</span> ${group.title}</h2>
                    <div class="overflow-x-auto"><table class="w-full text-xs text-left"><thead class="bg-slate-50 text-slate-500 font-bold"><tr>
                        <th class="px-4 py-4">肌肉名稱 (English)</th><th class="px-4 py-4">起點 (O)</th><th class="px-4 py-4">終點 (I)</th><th class="px-4 py-4 text-blue-600">神經支配</th><th class="px-4 py-4">動作</th><th class="px-4 py-4 text-red-600">拮抗</th>
                    </tr></thead><tbody class="divide-y divide-slate-100">
                        ${group.muscles.map(m => `<tr class="hover:bg-slate-50">
                            <td class="px-4 py-4 font-bold text-slate-900">${m.n}<br><span class="text-[10px] text-slate-400 font-normal italic">${m.en}</span></td>
                            <td class="px-4 py-4 text-slate-500">${m.o}</td><td class="px-4 py-4 text-slate-500">${m.i}</td>
                            <td class="px-4 py-4 text-blue-600 font-black">${m.nv}</td><td class="px-4 py-4 text-slate-600 font-medium">${m.a}</td>
                            <td class="px-4 py-4 text-red-600 font-bold">${m.ant}</td>
                        </tr>`).join('')}
                    </tbody></table></div>`;
                tableContainer.appendChild(section);
            });

            // Populate Nodes
            nodes.forEach(n => {
                const d = document.createElement('div');
                d.className = 'landmark-card p-3 rounded-xl border text-xs font-bold bg-white shadow-sm flex justify-between items-center';
                d.innerHTML = `${n.name} <span class="bg-slate-50 text-slate-400 px-2 py-0.5 rounded text-[9px]">ANALYSIS</span>`;
                d.onclick = () => selectNode(n, d);
                document.getElementById(`${n.g}-nodes`).appendChild(d);
            });
        }

        function selectNode(node, el) {
            document.querySelectorAll('.landmark-card').forEach(c => c.classList.remove('node-active'));
            if(el) el.classList.add('node-active');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
            document.getElementById('view-title').innerText = node.name;
            document.getElementById('view-desc').innerText = node.desc;
            document.getElementById('tip-text').innerText = node.tip;
            document.getElementById('ins-list').innerHTML = node.ins.map(i => `<li class="font-bold text-lg py-2 border-b border-red-50 text-red-900 flex items-center"><span class="tag-i">I</span> ${i}</li>`).join('') || '<li>無主動肌終點</li>';
            document.getElementById('ori-list').innerHTML = node.ori.map(o => `<li class="font-bold text-lg py-2 border-b border-green-50 text-green-900 flex items-center"><span class="tag-o">O</span> ${o}</li>`).join('') || '<li>無主動肌起點</li>';
        }

        function mapJump(id) { 
            switchView('interactive'); 
            const node = nodes.find(n => n.id === id);
            if(node) selectNode(node, null);
        }

        window.onload = populate;
    </script>
</body>
</html>
