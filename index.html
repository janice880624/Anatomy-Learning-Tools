<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解剖導航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .node-active { background-color: #1e40af !important; color: white !important; border-color: #1e40af !important; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .landmark-card, .training-item-card { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border-radius: 12px; border: 1px solid #e2e8f0; }
        .landmark-card:hover, .training-item-card:hover { border-color: #3b82f6; background-color: #f0f7ff; transform: translateY(-2px); box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.05); }
        .hidden-view { display: none !important; }
        .muscle-row:hover { background-color: #f1f5f9; }
        .scroll-custom::-webkit-scrollbar { width: 6px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .training-category-header { font-size: 12px; font-weight: 900; letter-spacing: 0.1em; color: #64748b; margin-bottom: 12px; display: block; border-left: 4px solid #1e40af; padding-left: 10px; }
        
        /* Modal Styles */
        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(6px); transition: all 0.3s ease; }
        .clickable-muscle { cursor: pointer; transition: color 0.2s; }
        .clickable-muscle:hover { color: #2563eb; text-decoration: underline; }
    </style>
</head>
<body class="p-4 md:p-6 text-slate-800">
    <div class="max-w-[1750px] mx-auto">
        <!-- Header -->

            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight flex items-center">
                    解剖導航 <span class="ml-3 px-3 py-1 bg-blue-600 text-white text-base rounded-lg font-bold shadow-lg">v6.9</span>
                </h1>
            </div>
            <nav class="flex bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200 space-x-1">
                <button id="btn-interactive" onclick="switchView('interactive')" class="px-6 py-2 rounded-xl text-sm transition-all text-slate-600 hover:bg-slate-100 font-bold">📍 節點導航</button>
                <button id="btn-training" onclick="switchView('training')" class="px-6 py-2 rounded-xl text-sm transition-all text-slate-600 hover:bg-slate-100 font-bold">🏋️ 肌力訓練總表</button>
                <button id="btn-table" onclick="switchView('table')" class="px-6 py-2 rounded-xl text-sm transition-all text-slate-600 hover:bg-slate-100 font-bold">📋 完整資料表</button>
            </nav>
        </header>

        <!-- VIEW: Interactive Nodes (Default Home) -->
        <div id="view-interactive" class="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-in fade-in duration-500">
            <div class="lg:col-span-4 space-y-4 max-h-[85vh] overflow-y-auto pr-2 scroll-custom">
                <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm">

                    <div id="scapula-nodes" class="space-y-1.5"></div>
                    <div class="h-4"></div>
                    <div id="humerus-nodes" class="space-y-1.5"></div>
                    <div class="h-4"></div>
                    <div id="hand-nodes" class="space-y-1.5"></div>
                </div>
            </div>
            <div class="lg:col-span-8">
                <div id="node-display-panel" class="bg-white min-h-[650px] p-10 rounded-[3rem] shadow-xl border border-slate-100 flex flex-col">
                    <div id="node-empty-state" class="flex-grow flex flex-col items-center justify-center text-slate-300 text-center">
                        <p class="text-xl font-black text-slate-400 tracking-tight">請選擇左側解剖節點以查看詳情</p>
                    </div>
                    <div id="node-detail-view" class="hidden animate-in zoom-in duration-300">
                        <h2 id="node-view-title" class="text-4xl font-black text-slate-900 mb-2 tracking-tighter"></h2>
                        <p id="node-view-desc" class="text-slate-400 italic mb-8"></p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 mb-10">
                            <div>
                                <h4 class="text-red-700 font-black text-xs mb-6 uppercase tracking-widest border-b border-red-100 pb-2">輸入 (終點 Insertion)</h4>
                                <ul id="node-ins-list" class="space-y-4"></ul>
                            </div>
                            <div>
                                <h4 class="text-emerald-700 font-black text-xs mb-6 uppercase tracking-widest border-b border-emerald-100 pb-2">輸出 (起點 Origin)</h4>
                                <ul id="node-ori-list" class="space-y-4"></ul>
                            </div>
                        </div>
                        <div class="mt-10 p-8 bg-slate-900 rounded-[2.5rem] text-white shadow-2xl flex items-start">
                            <span class="text-2xl mr-4">🎓</span>

                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- VIEW: Training Master List -->

                            </div>
                        </div>
                    </div>

                            <p id="modal-muscle-en" class="text-slate-400 italic mt-1 font-medium"></p>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

                    { n: '伸指肌', en: 'Extensor Digitorum', o: '外上髁', i: '2-5 指腱膜', a: '伸 2-5 指', nv: '橈神經 (C7-C8)', tr: '伸指抗阻', ant: '屈指肌群' },
                    { n: '伸食指肌', en: 'Extensor Indicis', o: '尺骨', i: '食指腱膜', a: '獨伸食指', nv: '橈神經 (C7-C8)', tr: '指部獨立動作', ant: '屈指深肌' },
                    { n: '伸小指肌', en: 'Extensor Digiti Minimi', o: '外上髁', i: '小指腱膜', a: '獨伸小指', nv: '橈神經 (C7-C8)', tr: '指部獨立動作', ant: '屈指深肌' },
                    { n: '伸拇長肌', en: 'Extensor Pollicis Longus', o: '尺骨', i: '拇指遠節', a: '伸拇 IP', nv: '橈神經 (C7-C8)', tr: '伸拇誘發', ant: '屈拇長肌' },
                    { n: '伸拇短肌', en: 'Extensor Pollicis Brevis', o: '橈骨', i: '拇指近節', a: '伸拇 MCP', nv: '橈神經 (C7-C8)', tr: '伸拇誘發', ant: '屈拇長肌' },
                    { n: '外展拇長肌', en: 'Abductor Pollicis Longus', o: '橈尺骨', i: '1 掌骨', a: '外展拇指', nv: '橈神經 (C7-C8)', tr: '橈側穩定', ant: '內收拇肌' }
                ]
            }
        };

        const nodes = [
            { id: '1', g: 'scapula', name: '喙突 (Coracoid)', desc: '肩部重要樞紐', tip: '【輸入】胸小肌。此處壓痛常與圓肩姿勢相關。也是二頭肌短頭與喙肱肌的起點。', ins: ['胸小肌'], ori: ['肱二頭肌 (短頭)', '喙肱肌'] },
            { id: '2', g: 'scapula', name: '肩胛內側緣 (Medial Border)', desc: '核心穩定', tip: '前側輸入：前鋸肌。後側輸入：菱形肌。翼狀肩胛評估的關鍵位置。', ins: ['前鋸肌', '菱形肌'], ori: [] },
            { id: '3', g: 'scapula', name: '盂上/下結節', desc: '肩臼地標', tip: '盂上：二頭肌長頭。盂下：三頭肌長頭。臨床常用於評估關節唇。', ins: [], ori: ['肱二頭肌 (長頭)', '肱三頭肌 (長頭)'] },
            { id: '4', g: 'scapula', name: '肩峰 (Acromion)', desc: '最高骨點', tip: '斜方肌中束終止於此，三角肌中束起點。肩夾擠好發區。', ins: ['斜方肌 (中束)'], ori: ['三角肌 (中束)'] },
            { id: '5', g: 'humerus', name: '結節間溝 (Groove)', desc: '二王一后', tip: '外側唇(胸大)、底(闊背)、內側唇(大圓)。', ins: ['胸大肌 (上)', '胸大肌 (下)', '闊背肌', '大圓肌'], ori: [] },
            { id: '6', g: 'humerus', name: '大結節 (GT)', desc: '後外側附著', tip: 'SITS 中的棘上、棘下、小圓肌終點。', ins: ['棘上肌', '棘下肌', '小圓肌'], ori: [] },
            { id: '7', g: 'humerus', name: '小結節 (LT)', desc: '前側附著', tip: '只有肩胛下肌終止於此，負責內旋。', ins: ['肩胛下肌'], ori: [] },
            { id: '16', g: 'humerus', name: '內上髁 (Medial Epi)', desc: '屈肌總源頭', tip: '高爾夫球肘發作點。包含所有前臂淺層屈肌與旋前圓肌。', ins: [], ori: ['旋前圓肌', '橈側屈腕肌', '掌長肌', '尺側屈腕肌', '屈指淺肌'] },
            { id: '17', g: 'humerus', name: '外上髁 (Lateral Epi)', desc: '伸肌總源頭', tip: '網球肘發作點。包含伸腕、伸指肌群與旋後肌。', ins: [], ori: ['旋後肌', '肘肌', '橈側伸腕短肌', '伸指肌', '伸小指肌', '尺側伸腕肌'] },
            { id: '10', g: 'hand', name: '橈骨粗隆 (Radial Tub)', desc: '動力點', tip: '二頭肌唯一終點。具強力旋後槓桿效應。', ins: ['肱二頭肌 (長/短)'], ori: [] },
            { id: '11', g: 'hand', name: '尺骨粗隆/冠狀突', desc: '屈肘動力點', tip: '肱肌與旋前圓肌附著處。', ins: ['肱肌'], ori: ['旋前圓肌'] },
            { id: '12', g: 'hand', name: '鷹嘴突 (Olecranon)', desc: '伸肘終點', tip: '三頭肌所有頭共同終止於此。', ins: ['肱三頭肌 (所有頭)'], ori: ['尺側屈腕肌 (部分)'] },
            { id: '22', g: 'hand', name: '第 2,3 掌骨基部', desc: '橈側中心', tip: '橈側屈腕肌與伸腕肌匯集處。', ins: ['橈側屈腕肌'], ori: [] },
            { id: '23', g: 'hand', name: '第 5 掌骨/豆狀骨', desc: '尺側中心', tip: '尺側屈腕肌與伸腕肌匯集處。', ins: ['尺側屈腕肌', '尺側伸腕肌'], ori: [] }
        ];

        const trainingData = [
            { cat: 'girdle', name: 'Push-up Plus', targets: ['前鋸肌'], tip: '修正「翼狀肩胛」的首選。在撐起後額外推動肩胛前突。' },
            { cat: 'girdle', name: 'Prone Y-Raise', targets: ['斜方肌 (下束)'], tip: '強化下斜方肌穩定肩胛，預防肩夾擠與代償。' },
            { cat: 'girdle', name: 'Prone T-Raise', targets: ['斜方肌 (中束)', '菱形肌'], tip: '改善圓肩，強化肩胛骨內收(後縮)肌群。' },
            { cat: 'joint', name: 'Full Can Exercise', targets: ['棘上肌'], tip: '外展 30° 內訓練棘上肌，拇指朝上減少空間壓迫。' },
            { cat: 'joint', name: 'Side-lying ER', targets: ['棘下肌', '小圓肌'], tip: '側臥外旋。維持肱骨頭於關節窩中心。' },
            { cat: 'joint', name: 'Band Internal Rotation', targets: ['肩胛下肌'], tip: '前側旋轉肌袖穩定，對抗外旋代償。' },
            { cat: 'elbow-hand', name: 'Hammer Curls', targets: ['肱肌', '肱橈肌'], tip: '中立位彎舉更有效誘發「工作馬」肱肌。' },
            { cat: 'elbow-hand', name: 'Eccentric Wrist Ext.', targets: ['伸腕肌群'], tip: '針對「網球肘」的離心復健治療。' }
        ];

        function switchView(v) {
            ['interactive', 'training', 'table'].forEach(id => document.getElementById(`view-${id}`).classList.add('hidden-view'));
            document.getElementById(`view-${v}`).classList.remove('hidden-view');
            document.querySelectorAll('nav button').forEach(b => b.className = "px-6 py-2 rounded-xl text-sm transition-all text-slate-600 hover:bg-slate-100 font-bold");
            const activeBtn = document.getElementById(`btn-${v}`);
            if(v === 'training') activeBtn.className = "px-6 py-2 rounded-xl text-sm transition-all bg-emerald-600 text-white font-black shadow-lg";
            else if(v === 'interactive') activeBtn.className = "px-6 py-2 rounded-xl text-sm transition-all bg-blue-600 text-white font-black shadow-lg";
            else activeBtn.className = "px-6 py-2 rounded-xl text-sm transition-all bg-slate-800 text-white font-black shadow-lg";
        }

        function findMuscle(name) {
            for (let cat in database) {
                const m = database[cat].muscles.find(item => item.n === name || name.includes(item.n));
                if (m) return m;
            }
            return null;
        }

        function openMuscleModal(name) {
            const m = findMuscle(name);
            if (!m) return;
            document.getElementById('modal-muscle-name').innerText = m.n;
            document.getElementById('modal-muscle-en').innerText = m.en;
            document.getElementById('modal-o').innerText = m.o;
            document.getElementById('modal-i').innerText = m.i;
            document.getElementById('modal-nv').innerText = m.nv;
            document.getElementById('modal-a').innerText = m.a;
            document.getElementById('modal-ant').innerText = m.ant || '-';
            document.getElementById('modal-tr').innerText = m.tr || '-';
            document.getElementById('muscle-modal').classList.replace('hidden', 'flex');
        }

        function closeMuscleModal() { document.getElementById('muscle-modal').classList.replace('flex', 'hidden'); }

        function populate() {
            trainingData.forEach(t => {
                const box = document.createElement('div');
                box.className = "training-item-card p-5 bg-white shadow-sm flex items-center justify-between group";
                box.innerHTML = `<div><span class="text-base font-black text-slate-800 group-hover:text-blue-600">${t.name}</span><div class="flex gap-3 mt-2">${t.targets.map(tar => `<span class="text-[10px] text-slate-400 font-bold">#${tar}</span>`).join('')}</div></div><span class="text-emerald-500 opacity-0 group-hover:opacity-100 transition-opacity">➔</span>`;
                box.onclick = () => selectTraining(t, box);
                document.getElementById(`boxes-${t.cat}`).appendChild(box);
            });

            const container = document.getElementById('table-render-container');
            Object.keys(database).forEach(key => {
                const group = database[key];
                const section = document.createElement('div');
                section.className = "bg-white p-10 rounded-[3rem] shadow-lg border border-slate-200 overflow-hidden";
                section.innerHTML = `<h2 class="text-2xl font-black text-slate-900 mb-6 flex items-center"><span class="mr-3 text-blue-600">${group.icon}</span> ${group.title}</h2>
                    <div class="overflow-x-auto"><table class="w-full text-xs text-left"><thead class="bg-slate-50 text-slate-500 font-bold border-b border-slate-200"><tr>
                        <th class="px-5 py-4">肌肉名稱 (中/英)</th><th class="px-5 py-4">起訖位置</th><th class="px-5 py-4">神經支配</th><th class="px-5 py-4">動作與訓練</th><th class="px-5 py-4">拮抗</th>
                    </tr></thead><tbody class="divide-y divide-slate-100">
                    ${group.muscles.map(m => `<tr class="hover:bg-slate-50">
                        <td class="px-5 py-6 font-black text-slate-900"><span class="clickable-muscle" onclick="openMuscleModal('${m.n}')">${m.n}</span><br><span class="text-[10px] font-normal italic text-slate-400">${m.en}</span></td>
                        <td class="px-5 py-6 text-slate-500 text-[11px] leading-relaxed"><strong>起：</strong>${m.o}<br><strong>訖：</strong>${m.i}</td>
                        <td class="px-5 py-6 font-black text-blue-700 text-[11px]">${m.nv}</td>
                        <td class="px-5 py-6 text-[11px] font-medium"><p class="text-slate-600"><strong>動作：</strong>${m.a}</p><p class="text-emerald-700 mt-1 font-bold"><strong>訓練：</strong>${m.tr || '-'}</p></td>
                        <td class="px-5 py-6 font-bold text-red-500 text-[11px]">拮抗：${m.ant}</td>
                    </tr>`).join('')}
                    </tbody></table></div>`;
                container.appendChild(section);
            });

            nodes.forEach(n => {
                const d = document.createElement('div');
                d.className = "landmark-card p-4 border text-[13px] font-black bg-white mb-2 flex justify-between items-center shadow-sm";
                d.innerHTML = `${n.name} <span class="text-blue-500">📍</span>`;
                d.onclick = () => selectNode(n, d);
                document.getElementById(`${n.g}-nodes`).appendChild(d);
            });
        }

        function selectTraining(t, el) {
            document.querySelectorAll('.training-item-card').forEach(c => c.classList.remove('node-active'));
            el.classList.add('node-active');
            document.getElementById('training-empty-state').classList.add('hidden');
            document.getElementById('training-detail-view').classList.remove('hidden');
            document.getElementById('training-view-title').innerText = t.name;
            document.getElementById('training-view-tip').innerText = t.tip;
            document.getElementById('training-target-list').innerHTML = t.targets.map(tar => `<span onclick="openMuscleModal('${tar}')" class="text-blue-700 font-black cursor-pointer hover:underline mr-4 text-base">${tar}</span>`).join('');
        }

        function selectNode(node, el) {
            document.querySelectorAll('.landmark-card').forEach(c => c.classList.remove('node-active'));
            if(el) el.classList.add('node-active');
            document.getElementById('node-empty-state').classList.add('hidden');
            document.getElementById('node-detail-view').classList.remove('hidden');
            document.getElementById('node-view-title').innerText = node.name;
            document.getElementById('node-view-desc').innerText = node.desc;
            document.getElementById('node-tip-text').innerText = node.tip;
            document.getElementById('node-ins-list').innerHTML = node.ins.map(i => `<li class="font-black text-xl py-3 border-b border-slate-100 flex items-center hover:text-blue-600 cursor-pointer" onclick="openMuscleModal('${i}')">• ${i}</li>`).join('') || '<li>(無終點)</li>';
            document.getElementById('node-ori-list').innerHTML = node.ori.map(o => `<li class="font-black text-xl py-3 border-b border-slate-100 flex items-center hover:text-blue-600 cursor-pointer" onclick="openMuscleModal('${o}')">• ${o}</li>`).join('') || '<li>(無起點)</li>';
        }

        window.onload = () => { populate(); switchView('interactive'); };
    </script>
</body>
</html>
